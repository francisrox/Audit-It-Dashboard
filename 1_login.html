<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diggibyte – Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e1a;
  --bg2: #111827;
  --bg3: #1a2235;
  --card: #141c2e;
  --border: #1e2d45;
  --text: #e8edf5;
  --text2: #7a8ba8;
  --primary: #2563eb;
  --danger: #ef4444;
  --orange: #f97316;
  --radius: 14px;
}
[data-theme="light"] {
  --bg: #f0f4fb;
  --bg2: #e8edf7;
  --bg3: #dce4f0;
  --card: #ffffff;
  --border: #d0daea;
  --text: #0f172a;
  --text2: #64748b;
}
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Syne', sans-serif;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(37,99,235,0.15), transparent 60%),
    radial-gradient(ellipse at 80% 80%, rgba(249,115,22,0.1), transparent 60%),
    var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* Animated background orbs */
body::before {
  content: '';
  position: fixed;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(37,99,235,0.08), transparent 70%);
  top: -100px; left: -100px;
  border-radius: 50%;
  animation: drift 12s ease-in-out infinite alternate;
  pointer-events: none;
}
body::after {
  content: '';
  position: fixed;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(249,115,22,0.06), transparent 70%);
  bottom: -80px; right: -80px;
  border-radius: 50%;
  animation: drift 15s ease-in-out infinite alternate-reverse;
  pointer-events: none;
}
@keyframes drift { from { transform: translate(0,0); } to { transform: translate(40px, 30px); } }

.login-wrapper {
  width: 440px;
  max-width: 95vw;
  position: relative;
  z-index: 1;
}

.login-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 22px;
  padding: 48px 44px;
  box-shadow: 0 28px 80px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.04);
  animation: slideUp 0.45s cubic-bezier(0.16,1,0.3,1);
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(30px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* Brand */
.login-brand {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 36px;
  justify-content: center;
}
.login-logo-box {
  width: 52px; height: 52px;
  background: #ffffff;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 6px 20px rgba(0,0,0,0.35);
  flex-shrink: 0;
}
.login-brand-text { text-align: left; }
.login-brand-name {
  font-size: 18px;
  font-weight: 800;
  line-height: 1.1;
  letter-spacing: -0.3px;
}
.login-brand-name span { color: var(--orange); }
.login-brand-sub {
  font-family: 'JetBrains Mono';
  font-size: 10px;
  color: var(--text2);
  margin-top: 3px;
}

.login-divider {
  height: 1px;
  background: var(--border);
  margin: 0 0 28px;
}

.login-title {
  font-size: 24px;
  font-weight: 800;
  text-align: center;
  margin-bottom: 6px;
  letter-spacing: -0.3px;
}
.login-subtitle {
  text-align: center;
  color: var(--text2);
  font-family: 'JetBrains Mono';
  font-size: 11px;
  margin-bottom: 32px;
}

/* Fields */
.login-field { margin-bottom: 18px; }
.login-field label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: var(--text2);
  font-family: 'JetBrains Mono';
  letter-spacing: 1.2px;
  text-transform: uppercase;
  margin-bottom: 7px;
}
.input-wrap {
  position: relative;
  display: flex;
  align-items: center;
}
.input-icon {
  position: absolute;
  left: 13px;
  font-size: 15px;
  opacity: 0.45;
  pointer-events: none;
}
.login-field input {
  width: 100%;
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 11px;
  padding: 12px 14px 12px 38px;
  font-family: 'Syne';
  font-size: 14px;
  outline: none;
  transition: border 0.2s, box-shadow 0.2s;
}
.login-field input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
}
.login-field input::placeholder { color: var(--text2); opacity: 0.6; }

/* Button */
.login-btn {
  width: 100%;
  background: linear-gradient(135deg, var(--primary), #1d4ed8);
  color: #fff;
  border: none;
  border-radius: 11px;
  padding: 14px;
  font-family: 'Syne';
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 10px;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  letter-spacing: 0.2px;
}
.login-btn:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(37,99,235,0.35); }
.login-btn:active { transform: translateY(0); }

.login-err {
  color: var(--danger);
  font-family: 'JetBrains Mono';
  font-size: 11px;
  text-align: center;
  margin-top: 12px;
  min-height: 18px;
  background: rgba(239,68,68,0.08);
  border-radius: 7px;
  padding: 6px 10px;
  display: none;
}
.login-err.visible { display: block; }

/* Footer strip */
.login-footer {
  margin-top: 24px;
  padding-top: 18px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  font-family: 'JetBrains Mono';
  font-size: 10px;
  color: var(--text2);
}
.login-footer-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--orange);
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

/* Theme toggle */
.theme-btn {
  position: fixed;
  top: 20px; right: 20px;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text2);
  border-radius: 9px;
  padding: 7px 12px;
  font-family: 'Syne';
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  z-index: 10;
}
.theme-btn:hover { color: var(--text); background: var(--bg3); }

@media (max-width: 500px) {
  .login-card { padding: 36px 24px; }
  .login-title { font-size: 20px; }
}
</style>
</head>
<body>

<button class="theme-btn" onclick="toggleTheme()">🌓 Theme</button>

<div class="login-wrapper">
  <div class="login-card">

    <!-- Brand -->
    <div class="login-brand">
      <div class="login-logo-box">
        <svg width="38" height="38" viewBox="0 0 48 48" fill="none">
          <path d="M10 8L10 40L26 40C36 40 42 33 42 24C42 15 36 8 26 8Z" fill="#FF6B00"/>
          <path d="M10 8L10 40L24 40C33 40 38 33 38 24C38 15 33 8 24 8Z" fill="#FF8C00"/>
          <path d="M30 16L18 26L25 26L18 38L32 24L25 24Z" fill="white" opacity="0.95"/>
        </svg>
      </div>
      <div class="login-brand-text">
        <div class="login-brand-name">Diggibyte <span>Technologies</span></div>
        <div class="login-brand-sub">IT Infrastructure & Security Audit</div>
      </div>
    </div>

    <div class="login-divider"></div>

    <div class="login-title">Welcome Back</div>
    <div class="login-subtitle">Sign in to access the Audit Dashboard</div>

    <!-- Username -->
    <div class="login-field">
      <label>Username</label>
      <div class="input-wrap">
        <span class="input-icon">👤</span>
        <input type="text" id="loginUser" placeholder="Enter your username" autocomplete="off"/>
      </div>
    </div>

    <!-- Password -->
    <div class="login-field">
      <label>Password</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" id="loginPass" placeholder="Enter your password"
          onkeydown="if(event.key==='Enter') doLogin()"/>
      </div>
    </div>

    <button class="login-btn" onclick="doLogin()">
      Sign In <span>→</span>
    </button>

    <div class="login-err" id="loginErr"></div>

    <div class="login-footer">
      <div class="login-footer-dot"></div>
      Secured by Diggibyte Technologies · IT Audit System
    </div>

  </div>
</div>

<script>
  // Redirect if already logged in
  if (sessionStorage.getItem('db_auth') === 'true') {
    window.location.href = '2_about.html';
  }

  function doLogin() {
    const u = document.getElementById('loginUser').value.trim();
    const p = document.getElementById('loginPass').value;
    const errEl = document.getElementById('loginErr');

    errEl.classList.remove('visible');

    if (!u || !p) {
      errEl.textContent = 'Please enter both username and password.';
      errEl.classList.add('visible');
      return;
    }

    // Credentials check — update username/password here as needed
    if (u === 'admin' && p === 'diggibyte@2025') {
      sessionStorage.setItem('db_auth', 'true');
      sessionStorage.setItem('db_user', u);
      // Animate out then redirect
      document.querySelector('.login-card').style.transition = 'opacity 0.3s, transform 0.3s';
      document.querySelector('.login-card').style.opacity = '0';
      document.querySelector('.login-card').style.transform = 'translateY(-16px)';
      setTimeout(() => { window.location.href = '2_about.html'; }, 320);
    } else {
      errEl.textContent = 'Invalid username or password. Please try again.';
      errEl.classList.add('visible');
      document.getElementById('loginPass').value = '';
      document.getElementById('loginPass').focus();
      // Shake animation
      document.querySelector('.login-card').style.animation = 'none';
      document.querySelector('.login-card').style.transform = 'translateX(6px)';
      setTimeout(() => { document.querySelector('.login-card').style.transform = 'translateX(-6px)'; }, 80);
      setTimeout(() => { document.querySelector('.login-card').style.transform = 'translateX(4px)'; }, 160);
      setTimeout(() => { document.querySelector('.login-card').style.transform = 'translateX(0)'; }, 240);
    }
  }

  function toggleTheme() {
    const t = document.documentElement.dataset.theme;
    document.documentElement.dataset.theme = t === 'dark' ? 'light' : 'dark';
  }

  // Auto-focus username
  window.addEventListener('load', () => {
    document.getElementById('loginUser').focus();
  });
</script>
</body>
</html>
